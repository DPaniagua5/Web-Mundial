name: Fetch World Cup 2026 Data

on:
  schedule:
    - cron: '*/5 12-23 * * *'
    - cron: '*/30 0-11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-wc-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch matches & standings from football-data.org
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: |
          BASE="https://api.football-data.org/v4"
          WC_ID="2000"

          fetch() {
            curl -sf -H "X-Auth-Token: $FOOTBALL_API_KEY" "$1"
          }

          mkdir -p data

          fetch "$BASE/competitions/$WC_ID/matches"         > data/matches.json   || echo '{"matches":[]}' > data/matches.json
          fetch "$BASE/competitions/$WC_ID/standings"       > data/standings.json || echo '{"standings":[]}' > data/standings.json
          fetch "$BASE/competitions/$WC_ID/teams"           > data/teams.json     || echo '{"teams":[]}' > data/teams.json
          fetch "$BASE/competitions/$WC_ID/scorers?limit=20" > data/scorers.json  || echo '{"scorers":[]}' > data/scorers.json

          echo "{\"updated\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > data/meta.json

          echo "Data fetched at $(date -u +%H:%M)"

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update WC2026 data"
            git push
          fi